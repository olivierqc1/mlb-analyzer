<!-- index.html PARTIE 1/2 — CSS + HTML (colle en premier) -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎰 Multi-Sport Analyzer v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e13;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px}
.container{max-width:600px;margin:0 auto;padding:12px;padding-bottom:80px}
.header{text-align:center;padding:12px 0 8px}
.header h1{font-size:1.25em;font-weight:800}
.header p{color:#475569;font-size:10px;margin-top:3px}
/* Mode tabs */
.mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.mode-tab{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;color:#94a3b8;font-weight:600}
.mode-tab.active{background:#7c3aed22;border-color:#7c3aed;color:#a78bfa}
/* Sport tabs */
.sport-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:10px}
.sport-tab{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 2px;text-align:center;cursor:pointer;transition:all .15s}
.sport-tab .si{font-size:15px;display:block;margin-bottom:2px}
.sport-tab .sl{font-size:9px;font-weight:700;color:#94a3b8}
.sport-tab .ss{font-size:7px;color:#475569}
.sport-tab.active .sl{color:#fff}
.sport-tab.active.mlb{background:#2563eb22;border-color:#2563eb}
.sport-tab.active.nba{background:#f9731622;border-color:#f97316}
.sport-tab.active.nhl{background:#dc262622;border-color:#dc2626}
.sport-tab.active.ten{background:#ca8a0422;border-color:#ca8a04}
.sport-tab.active.soc{background:#16a34a22;border-color:#16a34a}
/* Stat tabs */
.stat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.stat-tab{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:11px;color:#94a3b8}
.stat-tab.active{background:#334155;color:#fff;font-weight:700}
/* Controls */
.controls{background:#1e293b;border-radius:10px;padding:10px;margin-bottom:10px;display:flex;gap:8px;align-items:center}
.edge-input{background:#334155;border:1px solid #475569;border-radius:6px;padding:8px;color:#fff;font-size:13px;width:65px}
.btn{background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;border-radius:8px;padding:10px 16px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:linear-gradient(135deg,#16a34a,#22c55e)}
/* Status */
.status{text-align:center;color:#60a5fa;font-size:11px;margin-bottom:6px;min-height:16px}
.err{background:#dc262622;border:1px solid #dc2626;border-radius:8px;padding:9px;margin-bottom:8px;font-size:12px;color:#fca5a5}
.info-msg{background:#2563eb18;border:1px solid #2563eb;border-radius:8px;padding:12px;font-size:12px;color:#93c5fd;text-align:center}
/* Summary bar */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px;background:#1e293b;border-radius:10px;padding:8px}
.si-box{text-align:center}.sv{font-size:1.25em;font-weight:700;color:#4ade80}.sl2{font-size:9px;color:#475569;margin-top:1px}
/* Section title */
.sec-title{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin:8px 0 5px}
/* Cards */
.card{background:#1e293b;border-radius:12px;padding:12px;margin-bottom:9px;border:1px solid #334155}
.grade-banner{border-radius:8px;padding:9px 11px;margin-bottom:9px}
.gb-a{background:#16a34a18;border:1.5px solid #16a34a}
.gb-b{background:#86efac12;border:1.5px solid #86efac}
.gb-c{background:#ca8a0415;border:1.5px solid #ca8a04}
.grade-val{font-size:1.2em;font-weight:800;margin-bottom:3px}
.pros{list-style:none}.pros li{font-size:10px;padding:1px 0;color:#94a3b8}
.issues{list-style:none;margin-top:3px}.issues li{font-size:10px;padding:1px 0;color:#f87171}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pname{font-weight:700;font-size:14px}
.ptags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.chip{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600}
.chip-ev{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf24}
.chip-stat{background:#6366f122;color:#a5b4fc;border:1px solid #6366f1}
.matchup{color:#475569;font-size:10px;margin-top:2px}
.rec-badge{padding:5px 9px;border-radius:7px;font-weight:700;font-size:12px;flex-shrink:0;text-align:center}
.rec-over{background:#16a34a22;color:#4ade80;border:1px solid #16a34a}
.rec-under{background:#dc262622;color:#f87171;border:1px solid #dc2626}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:#0a0e13;border-radius:6px;padding:6px;margin-bottom:7px}
.sc{text-align:center}.sc .l{color:#475569;font-size:9px}.sc .v{font-size:12px;font-weight:600}
.prob-wrap{margin-bottom:6px}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-bottom:3px}
.prob-bar{height:6px;background:#0f172a;border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px}
.pf-over{background:linear-gradient(90deg,#16a34a,#4ade80)}
.pf-under{background:linear-gradient(90deg,#dc2626,#f87171)}
.history-chart{display:flex;gap:3px;align-items:flex-end;height:40px;background:#0a0e13;border-radius:5px;padding:4px;margin-bottom:3px}
.hbar{flex:1;border-radius:2px 2px 0 0;position:relative}
.hbar-over{background:linear-gradient(0deg,#16a34a,#4ade80)}
.hbar-under{background:linear-gradient(0deg,#7f1d1d,#dc2626)}
.hbar-line{position:absolute;left:0;right:0;height:2px;background:#fbbf24}
.expand-btn{width:100%;background:none;border:none;color:#475569;font-size:10px;padding:5px;cursor:pointer}
.detail-wrap{margin-top:7px}
.detail-sec{background:#0a0e13;border-radius:6px;padding:8px;margin-bottom:6px}
.detail-title{color:#64748b;font-size:10px;text-transform:uppercase;margin-bottom:5px}
.dr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1e293b;font-size:11px}
.dr:last-child{border:none}.dl{color:#475569}.dv{font-weight:600}
.recent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:5px}
.rc{background:#1e293b;border-radius:4px;padding:4px 2px;text-align:center}
.rc.ov{border-top:2px solid #16a34a}.rc.un{border-top:2px solid #dc2626}
.rk{font-size:12px;font-weight:700}.rd{color:#334155;font-size:8px}
.empty{text-align:center;color:#334155;padding:40px 16px}
.empty-icon{font-size:40px;margin-bottom:8px}
/* History */
.hist-summary{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.kpi{background:#0a0e13;border-radius:7px;padding:8px;text-align:center}
.kpi-v{font-size:1.4em;font-weight:800}.kpi-l{font-size:9px;color:#475569;margin-top:1px}
.green{color:#4ade80}.red{color:#f87171}.blue{color:#60a5fa}.yellow{color:#fbbf24}
.hist-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.hf{background:#1e293b;border:1px solid #334155;border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;color:#94a3b8}
.hf.active{background:#334155;color:#fff}
.bet-card{background:#1e293b;border-radius:10px;padding:11px;margin-bottom:8px;border-left:3px solid #334155}
.bet-card.won{border-left-color:#16a34a}.bet-card.lost{border-left-color:#dc2626}.bet-card.pending{border-left-color:#fbbf24}
.bet-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.bet-player{font-weight:700;font-size:13px}.bet-meta{font-size:10px;color:#475569;margin-top:1px}
.rb{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;flex-shrink:0}
.rb-won{background:#16a34a22;color:#4ade80}.rb-lost{background:#dc262622;color:#f87171}
.rb-pending{background:#fbbf2422;color:#fbbf24}.rb-loading{background:#60a5fa22;color:#60a5fa}
.bet-details{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:#0a0e13;border-radius:5px;padding:5px;margin-top:5px;font-size:10px;text-align:center}
.bd-v{font-weight:700;font-size:12px}.bd-l{color:#475569;font-size:9px}
.btn-resolve{background:#334155;border:none;border-radius:5px;padding:3px 8px;color:#94a3b8;font-size:10px;cursor:pointer;margin-top:5px}
.btn-clear{background:#dc262218;border:1px solid #dc2626;border-radius:7px;padding:7px;color:#f87171;font-size:11px;cursor:pointer;width:100%;margin-top:8px}
/* Soccer */
.soc-tabs{display:flex;gap:6px;margin-bottom:10px}
.soc-tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.soc-tab.active{background:#16a34a;color:#000}
.soc-tab:not(.active){background:#1e293b;color:#94a3b8}
.soc-input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;padding:9px;color:#fff;font-size:13px;font-family:inherit;margin-bottom:7px}
.soc-select{width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;padding:9px;color:#fff;font-size:13px;font-family:inherit;margin-bottom:7px}
.prob-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #334155}
.odds-inp{background:#0a0e13;border:1px solid #334155;border-radius:5px;padding:5px 7px;color:#fff;font-size:12px;width:160px;font-family:inherit}
.ev-result{display:flex;justify-content:space-between;font-size:11px;padding:3px 0}
/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎰 Multi-Sport Analyzer</h1>
    <p>Hit rate empirique · EV · Kelly 25% · v4.0</p>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="modeScanner"  onclick="setMode('scanner')">📊 Scanner</div>
    <div class="mode-tab"        id="modeHistory"  onclick="setMode('history')">📋 Historique</div>
    <div class="mode-tab"        id="modeBacktest" onclick="setMode('backtest')">🔬 Backtest</div>
    

  </div>

  <!-- ── SCANNER ── -->
  <div id="scannerMode">
    <div class="sport-tabs">
      <div class="sport-tab mlb active" onclick="setSport('mlb',this)">
        <span class="si">⚾</span><span class="sl">MLB</span><span class="ss">K · TB</span></div>
      <div class="sport-tab nba" onclick="setSport('nba',this)">
        <span class="si">🏀</span><span class="sl">NBA</span><span class="ss">Pts·Reb·Ast</span></div>
      <div class="sport-tab nhl" onclick="setSport('nhl',this)">
        <span class="si">🏒</span><span class="sl">NHL</span><span class="ss">SOG</span></div>
      <div class="sport-tab ten" onclick="setSport('tennis',this)">
        <span class="si">🎾</span><span class="sl">Tennis</span><span class="ss">Aces</span></div>
      <div class="sport-tab soc" onclick="setSport('soccer',this)">
        <span class="si">⚽</span><span class="sl">Soccer</span><span class="ss">+EV Mkts</span></div>
    </div>
    <div class="stat-tabs" id="statTabs"></div>
    <div class="controls">
      <span style="color:#64748b;font-size:12px;flex:1">EV min (%)</span>
      <input type="number" class="edge-input" id="minEdge" value="3" min="1" max="20">
      <button class="btn" id="btnScan" onclick="scan()">🔍 Scanner</button>
    </div>
    <div class="status" id="scanStatus"></div>
    <div id="scanErr"></div>
    <div id="summary" style="display:none" class="summary">
      <div class="si-box"><div class="sv" id="sGames">-</div><div class="sl2">Matchs</div></div>
      <div class="si-box"><div class="sv" id="sAnalyzed">-</div><div class="sl2">Analysés</div></div>
      <div class="si-box"><div class="sv" id="sOpps">-</div><div class="sl2">Opps</div></div>
      <div class="si-box"><div class="sv" id="sEV">-</div><div class="sl2">EV moy.</div></div>
    </div>
    <div id="scanContent"></div>
  </div>

  <!-- ── HISTORIQUE ── -->
  <div id="historyMode" style="display:none">
    <div id="histSummary"></div>
    <div class="hist-filters">
      <div class="hf active" onclick="filterHist('all',this)">Tous</div>
      <div class="hf" onclick="filterHist('pending',this)">⏳ Attente</div>
      <div class="hf" onclick="filterHist('won',this)">✅ Gagnés</div>
      <div class="hf" onclick="filterHist('lost',this)">❌ Perdus</div>
      <div class="hf" onclick="filterHist('mlb',this)">⚾</div>
      <div class="hf" onclick="filterHist('nba',this)">🏀</div>
      <div class="hf" onclick="filterHist('nhl',this)">🏒</div>
      <div class="hf" onclick="filterHist('tennis',this)">🎾</div>
    </div>
    <button onclick="resolveAll()" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px;color:#60a5fa;font-size:12px;cursor:pointer;margin-bottom:10px;font-weight:600">🔄 Résoudre tous les bets en attente</button>
    <div id="histContent"></div>
    <button class="btn-clear" onclick="clearAll()">🗑️ Effacer tout l'historique</button>
  </div>

  <!-- ── BACKTEST ── -->
  <div id="backtestMode" style="display:none">
    <div class="card"><div id="btContent"></div></div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script>
const API = 'https://mlb-analyzer-fs15.onrender.com';
const STORAGE_KEY = 'multisport_v4';
const SPORT_STATS = {
  mlb:    [{key:'',label:'Tous'},{key:'pitcher_strikeouts',label:'⚾ K'},{key:'batter_total_bases',label:'🏏 TB'}],
  nba:    [{key:'',label:'Tous'},{key:'nba_points',label:'🏀 Pts'},{key:'nba_rebounds',label:'💪 Reb'},{key:'nba_assists',label:'🎯 Ast'}],
  nhl:    [{key:'',label:'Tous'},{key:'skater_shots',label:'🏒 SOG'}],
  tennis: [{key:'',label:'Tous'},{key:'tennis_aces',label:'🎾 Aces'}],
  soccer: [{key:'',label:'Tous'}],
};
const ICONS = {mlb:'⚾',nba:'🏀',nhl:'🏒',tennis:'🎾',soccer:'⚽'};
let currentSport='mlb', currentStat='', currentMode='scanner', histFilter='all';

// ── Storage ───────────────────────────────────────────────────────────────────
function loadBets(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }catch{ return [] } }
function saveBets(b){ localStorage.setItem(STORAGE_KEY, JSON.stringify(b)) }
function addBet(bet){
  const bets = loadBets();
  const dup  = bets.find(b => b.player===bet.player && b.stat_type===bet.stat_type && b.scan_date===bet.scan_date);
  if(!dup){ bets.unshift(bet); saveBets(bets); }
}
function autoSave(opps, sport){
  const today = new Date().toISOString().slice(0,10); let saved=0;
  opps.forEach(o => {
    if(!['A','B'].includes(o.quality?.grade)) return;
    addBet({
      id: `${o.player}_${o.stat_type}_${today}_${Date.now()}`,
      player: o.player, sport, stat_type: o.stat_type,
      stat_label: o.stat_label, scan_date: today,
      recommendation: o.line_analysis.recommendation,
      bookmaker_line: o.line_analysis.bookmaker_line,
      actual_odds: o.line_analysis.actual_odds,
      edge: o.line_analysis.edge,
      predicted_mean: o.deep_stats.weighted_mean,
      kelly: o.line_analysis.kelly_criterion,
      grade: o.quality.grade,
      game_info: o.game_info,
      status: 'pending', actual_value: null, resolved_date: null
    });
    saved++;
  });
  if(saved > 0) toast(`✅ ${saved} bet${saved>1?'s':''} Grade A/B sauvegardé${saved>1?'s':''}`);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Mode + Sport ──────────────────────────────────────────────────────────────
function setMode(mode){
  currentMode = mode;
  ['scanner','history','backtest'].forEach(m => {
    document.getElementById(m+'Mode').style.display = m===mode ? 'block':'none';
    const tab = document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1));
    if(tab) tab.className = 'mode-tab'+(m===mode?' active':'');
  });
  if(mode==='history')  renderHistory();
  if(mode==='backtest') renderBacktest();
}
function setSport(sport, el){
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentSport = sport; currentStat = '';
  renderStatTabs();
  document.getElementById('scanContent').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('scanStatus').textContent = '';
  document.getElementById('scanErr').innerHTML = '';
}
function setStat(stat, el){
  document.querySelectorAll('.stat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); currentStat = stat;
}
function renderStatTabs(){
  const tabs = SPORT_STATS[currentSport] || [];
  document.getElementById('statTabs').innerHTML = tabs.map(t =>
    `<div class="stat-tab${t.key===currentStat?' active':''}" onclick="setStat('${t.key}',this)">${t.label}</div>`
  ).join('');
}


// ── Scan ──────────────────────────────────────────────────────────────────────
async function scan(){
  const btn = document.getElementById('btnScan');
  const st  = document.getElementById('scanStatus');
  const minEV = document.getElementById('minEdge').value;
  btn.disabled = true;
  document.getElementById('scanErr').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('scanContent').innerHTML = '';
  st.textContent = '⏳ Réveil serveur (30-60s)...';
  try {
    await fetch(API+'/api/health').catch(()=>{});
    const sp = currentStat ? `&stat_type=${currentStat}` : '';
    st.textContent = `📊 Analyse ${currentSport.toUpperCase()} en cours...`;
    const res  = await fetch(`${API}/api/daily-opportunities?sport=${currentSport}&min_edge=${minEV}${sp}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(data.status==='INFO'){
      st.textContent = '';
      document.getElementById('scanContent').innerHTML = `<div class="info-msg">${data.message}</div>`;
      btn.disabled = false; return;
    }
    if(data.status!=='SUCCESS') throw new Error(data.message||'Erreur inconnue');
    const opps = data.opportunities||[];
    autoSave(opps, currentSport);
    st.textContent = `✅ ${opps.length} opp${opps.length!==1?'s':''} · ${data.players_analyzed} analysés · ${data.scan_time}`;
    if(opps.length > 0){
      const avgEV = opps.length ? (opps.reduce((s,o)=>s+(o.line_analysis.edge||0),0)/opps.length).toFixed(1) : '–';
      document.getElementById('sGames').textContent    = data.total_games||'–';
      document.getElementById('sAnalyzed').textContent = data.players_analyzed;
      document.getElementById('sOpps').textContent     = opps.length;
      document.getElementById('sEV').textContent       = avgEV+'%';
      document.getElementById('summary').style.display = 'grid';
    }
    renderCards(opps);
  } catch(e){
    st.textContent = '';
    document.getElementById('scanErr').innerHTML = `<div class="err">❌ ${e.message}</div>`;
  }
  btn.disabled = false;
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function renderCards(opps){
  const c = document.getElementById('scanContent');
  if(!opps.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">${ICONS[currentSport]||'🎰'}</div><p>Aucune opportunité trouvée</p><p style="font-size:11px;margin-top:5px;color:#334155">Essaie de baisser l'EV min ou de scanner plus tard.</p></div>`;
    return;
  }
  const ga=opps.filter(o=>o.quality.grade==='A');
  const gb=opps.filter(o=>o.quality.grade==='B');
  const gc=opps.filter(o=>o.quality.grade==='C');
  let html='';
  if(ga.length) html+=`<div class="sec-title">🟢 Grade A — auto-sauvegardés (${ga.length})</div>`+ga.map((o,i)=>buildCard(o,i)).join('');
  if(gb.length) html+=`<div class="sec-title">🟢 Grade B — auto-sauvegardés (${gb.length})</div>`+gb.map((o,i)=>buildCard(o,i+ga.length)).join('');
  if(gc.length) html+=`<div class="sec-title">🟡 Grade C — non sauvegardés (${gc.length})</div>`+gc.map((o,i)=>buildCard(o,i+ga.length+gb.length)).join('');
  c.innerHTML = html;
}

function buildCard(o, i){
  const la=o.line_analysis, ds=o.deep_stats, q=o.quality;
  const isO = la.recommendation==='OVER';
  const prob = isO ? la.over_probability : la.under_probability;
  const games = o.recent_games||[];
  const maxV  = Math.max(...games.map(g=>g.stat), la.bookmaker_line+1, 1);
  const lp    = (la.bookmaker_line/maxV)*100;
  const gcls  = {A:'gb-a',B:'gb-b',C:'gb-c'}[q.grade]||'gb-c';
  const atag  = ['A','B'].includes(q.grade) ? `<span style="font-size:9px;background:#16a34a22;color:#4ade80;padding:1px 5px;border-radius:3px">💾 auto-sauvé</span>` : '';
  const gi    = o.game_info||{};
  const mu    = gi.home_team&&gi.away_team ? `${gi.away_team} @ ${gi.home_team}` : '';
  const tr    = ds.trend==='up'?'📈':ds.trend==='down'?'📉':'➡️';

  const bars = games.slice(0,10).reverse().map(g =>
    `<div class="hbar ${g.stat>la.bookmaker_line?'hbar-over':'hbar-under'}" style="height:${Math.max(5,(g.stat/maxV)*100)}%">
      <div class="hbar-line" style="bottom:${lp}%"></div></div>`).join('');

  const cells = games.slice(0,10).map(g =>
    `<div class="rc ${g.stat>la.bookmaker_line?'ov':'un'}">
      <div class="rk">${g.stat}</div>
      <div class="rd">${g.date?g.date.slice(5):''}</div></div>`).join('');

  return `<div class="card">
    <div class="grade-banner ${gcls}">
      <div class="grade-val" style="color:${q.color}">Grade ${q.grade} — ${q.label} ${atag}</div>
      <ul class="pros">${(q.pros||[]).map(p=>`<li>${p}</li>`).join('')}</ul>
      ${(q.issues||[]).length?`<ul class="issues">${q.issues.map(p=>`<li>${p}</li>`).join('')}</ul>`:''}
    </div>
    <div class="card-top">
      <div>
        <div class="pname">${ICONS[o.sport]||'🎰'} ${o.player}</div>
        <div class="ptags">
          <span class="chip chip-ev">EV ${la.edge>=0?'+':''}${la.edge}%</span>
          <span class="chip chip-stat">${o.stat_label} · ${la.bookmaker_line}</span>
        </div>
        <div class="matchup">${mu}</div>
      </div>
      <div class="rec-badge ${isO?'rec-over':'rec-under'}">${la.recommendation}<br><span style="font-size:10px">${prob.toFixed(0)}%</span></div>
    </div>
    <div class="stats-row">
      <div class="sc"><div class="l">L5</div><div class="v" style="color:#60a5fa">${ds.avg_last_5}</div></div>
      <div class="sc"><div class="l">Moy</div><div class="v">${ds.weighted_mean||ds.mean}</div></div>
      <div class="sc"><div class="l">Hit%</div><div class="v" style="color:${ds.hit_rate>=55?'#4ade80':ds.hit_rate<=45?'#f87171':'#fbbf24'}">${ds.hit_rate}%</div></div>
      <div class="sc"><div class="l">Trend</div><div class="v">${tr}</div></div>
      <div class="sc"><div class="l">Kelly</div><div class="v" style="color:#a78bfa">${la.kelly_criterion}%</div></div>
    </div>
    <div class="prob-wrap">
      <div class="prob-labels"><span>OVER ${la.bookmaker_line} · ${la.over_probability}%</span><span>UNDER · ${la.under_probability}%</span></div>
      <div class="prob-bar"><div class="prob-fill ${isO?'pf-over':'pf-under'}" style="width:${prob}%"></div></div>
    </div>
    ${bars?`<div class="history-chart">${bars}</div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#334155;margin-bottom:6px">
      <span>← Ancien</span><span style="color:#fbbf24">— ${la.bookmaker_line} ${o.stat_label}</span><span>Récent →</span></div>`:''}
    <button class="expand-btn" onclick="toggle(${i},this)">▼ Détails + Historique (${ds.games_analyzed} matchs)</button>
    <div id="d${i}" style="display:none" class="detail-wrap">
      <div class="detail-sec">
        <div class="detail-title">Stats</div>
        <div class="dr"><span class="dl">Matchs analysés</span><span class="dv">${ds.games_analyzed}</span></div>
        <div class="dr"><span class="dl">Over / Under</span><span class="dv">${ds.over_count} / ${ds.under_count}</span></div>
        <div class="dr"><span class="dl">Moy pondérée</span><span class="dv">${ds.weighted_mean}</span></div>
        <div class="dr"><span class="dl">L10 moy</span><span class="dv">${ds.avg_last_10}</span></div>
        <div class="dr"><span class="dl">Cotes book</span><span class="dv">${la.actual_odds>=0?'+':''}${la.actual_odds} (${la.bookmaker})</span></div>
      </div>
      ${cells?`<div class="detail-sec"><div class="detail-title">10 derniers</div><div class="recent-grid">${cells}</div></div>`:''}
    </div>
  </div>`;
}
function toggle(i,btn){
  const d=document.getElementById('d'+i), open=d.style.display!=='none';
  d.style.display=open?'none':'block';
  btn.textContent=open?`▼ Détails + Historique`:'▲ Fermer';
}

// ── Résolution bets ───────────────────────────────────────────────────────────
async function resolveBet(betId){
  const bets = loadBets(); const bet = bets.find(b=>b.id===betId);
  if(!bet||bet.status!=='pending') return;
  const el = document.getElementById('rb_'+betId);
  if(el){ el.className='rb rb-loading'; el.textContent='⏳'; }
  try{

    const url = `${API}/api/actual-result?player=${encodeURIComponent(bet.player)}&stat_type=${bet.stat_type}&sport=${bet.sport}&date=${bet.scan_date}`;
    const res  = await fetch(url); if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json(); if(data.status!=='SUCCESS') throw new Error(data.message);
    const actual = data.actual_value; const line = bet.bookmaker_line;
    const won = (bet.recommendation==='OVER'&&actual>line)||(bet.recommendation==='UNDER'&&actual<line);
    const idx = bets.findIndex(b=>b.id===betId);
    bets[idx].status = won?'won':'lost';
    bets[idx].actual_value  = actual;
    bets[idx].resolved_date = data.date;
    saveBets(bets); renderHistory();
  }catch(e){
    if(el){ el.className='rb rb-pending'; el.textContent='⏳ En attente'; }
  }
}
async function resolveAll(){
  const bets = loadBets().filter(b=>b.status==='pending');
  if(!bets.length){ toast('Aucun bet en attente'); return; }
  toast(`🔄 Résolution de ${bets.length} bets...`);
  for(const bet of bets){ await resolveBet(bet.id); await new Promise(r=>setTimeout(r,400)); }
  toast('✅ Tous résolus!');
}

// ── Historique ────────────────────────────────────────────────────────────────
function filterHist(f,el){
  histFilter=f;
  document.querySelectorAll('.hf').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); renderHistory();
}
function renderHistory(){
  let all=loadBets();
  const resolved=all.filter(b=>b.status!=='pending');
  const won=all.filter(b=>b.status==='won').length;
  const lost=all.filter(b=>b.status==='lost').length;
  const pending=all.filter(b=>b.status==='pending').length;
  const hr=resolved.length?(won/resolved.length*100).toFixed(1):'–';
  const profit=resolved.reduce((s,b)=>s+(b.status==='won'?10*100/110:-10),0);
  const hrC=parseFloat(hr)>=52.4?'green':'red';
  const prC=profit>=0?'green':'red';
  document.getElementById('histSummary').innerHTML=`
    <div class="hist-summary">
      <div style="font-weight:700;margin-bottom:8px;color:#a78bfa">📋 Mon historique</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-v ${hrC}">${hr}%</div><div class="kpi-l">Hit Rate</div></div>
        <div class="kpi"><div class="kpi-v ${prC}">${profit>=0?'+':''}$${profit.toFixed(0)}</div><div class="kpi-l">Profit ($10/bet)</div></div>
        <div class="kpi"><div class="kpi-v blue">${all.length}</div><div class="kpi-l">Total bets</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;font-size:11px;text-align:center">
        <div style="background:#0a0e13;border-radius:5px;padding:5px"><span class="green">✅ ${won}</span> gagnés</div>
        <div style="background:#0a0e13;border-radius:5px;padding:5px"><span class="red">❌ ${lost}</span> perdus</div>
        <div style="background:#0a0e13;border-radius:5px;padding:5px"><span class="yellow">⏳ ${pending}</span> attente</div>
      </div>
      <div style="margin-top:6px;font-size:10px;color:#334155;text-align:center">Breakeven = 52.4% · simulation à $10 @ -110</div>
    </div>`;
  if(histFilter==='pending') all=all.filter(b=>b.status==='pending');
  else if(histFilter==='won') all=all.filter(b=>b.status==='won');
  else if(histFilter==='lost') all=all.filter(b=>b.status==='lost');
  else if(['mlb','nba','nhl','tennis'].includes(histFilter)) all=all.filter(b=>b.sport===histFilter);
  if(!all.length){
    document.getElementById('histContent').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>Aucun bet dans cette catégorie</p></div>`;
    return;
  }
  document.getElementById('histContent').innerHTML=all.map(b=>{
    const isO=b.recommendation==='OVER';
    const rbc=b.status==='won'?'rb-won':b.status==='lost'?'rb-lost':'rb-pending';
    const rbt=b.status==='won'?`✅ Gagné (${b.actual_value} ${b.stat_label})`:b.status==='lost'?`❌ Perdu (${b.actual_value} ${b.stat_label})`:'⏳ En attente';
    const gi=b.game_info||{}; const mu=gi.away_team&&gi.home_team?`${gi.away_team} @ ${gi.home_team}`:'';
    const pnl=b.status==='won'?`+$${(10*100/110).toFixed(2)}`:b.status==='lost'?'-$10.00':'–';
    const pc=b.status==='won'?'#4ade80':b.status==='lost'?'#f87171':'#fbbf24';
    const gc=b.grade==='A'?'#4ade80':b.grade==='B'?'#86efac':'#fbbf24';
    const oddsStr=b.actual_odds!=null?(b.actual_odds>=0?`+${b.actual_odds}`:b.actual_odds):'–';
    return `<div class="bet-card ${b.status}">
      <div class="bet-header">
        <div>
          <div class="bet-player">${ICONS[b.sport]||'🎰'} ${b.player}</div>
          <div class="bet-meta">${b.scan_date} · ${mu||b.stat_type} · Grade <span style="color:${gc}">${b.grade}</span></div>
        </div>
        <div class="rb ${rbc}" id="rb_${b.id}">${rbt}</div>
      </div>
      <div class="bet-details">
        <div><div class="bd-v" style="color:${isO?'#4ade80':'#f87171'}">${b.recommendation}</div><div class="bd-l">Direction</div></div>
        <div><div class="bd-v">${b.bookmaker_line} ${b.stat_label}</div><div class="bd-l">Ligne</div></div>
        <div><div class="bd-v" style="color:#fbbf24">${b.edge>=0?'+':''}${typeof b.edge==='number'?b.edge.toFixed(1):b.edge}%</div><div class="bd-l">EV</div></div>
        <div><div class="bd-v" style="color:${pc}">${pnl}</div><div class="bd-l">P&L</div></div>
      </div>
      ${b.status==='pending'?`<button class="btn-resolve" onclick="resolveBet('${b.id}')">🔄 Vérifier résultat</button>`:''}
    </div>`;
  }).join('');
}
function clearAll(){ if(confirm('Effacer tout?')){ localStorage.removeItem(STORAGE_KEY); renderHistory(); } }

// ── Backtest ──────────────────────────────────────────────────────────────────
function renderBacktest(){
  const bets=loadBets().filter(b=>b.status!=='pending');
  if(bets.length<5){
    document.getElementById('btContent').innerHTML=`<div class="empty"><div class="empty-icon">🔬</div><p>Pas assez de données</p><p style="font-size:11px;margin-top:5px">5 bets résolus minimum.</p></div>`;
    return;
  }
  const won=bets.filter(b=>b.status==='won').length;
  const hr=(won/bets.length*100).toFixed(1);
  const profit=bets.reduce((s,b)=>s+(b.status==='won'?10*100/110:-10),0);
  const roi=(profit/(bets.length*10)*100).toFixed(1);
  const sports=[...new Set(bets.map(b=>b.sport))];
  const grades=['A','B','C'];
  const sportRows=sports.map(sp=>{
    const sb=bets.filter(b=>b.sport===sp); const sw=sb.filter(b=>b.status==='won').length;
    const shr=(sw/sb.length*100).toFixed(0); const sp2=sb.reduce((s,b)=>s+(b.status==='won'?10*100/110:-10),0);
    return `<div class="dr"><span class="dl">${ICONS[sp]||sp} (${sb.length})</span><span class="dv" style="color:${parseFloat(shr)>=52?'#4ade80':'#f87171'}">${shr}% · ${sp2>=0?'+':''}$${sp2.toFixed(0)}</span></div>`;
  }).join('');
  const gradeRows=grades.map(g=>{
    const gb=bets.filter(b=>b.grade===g); if(!gb.length) return '';
    const gw=gb.filter(b=>b.status==='won').length; const ghr=(gw/gb.length*100).toFixed(0);
    const gp=gb.reduce((s,b)=>s+(b.status==='won'?10*100/110:-10),0);
    return `<div class="dr"><span class="dl">Grade ${g} (${gb.length})</span><span class="dv" style="color:${parseFloat(ghr)>=52?'#4ade80':'#f87171'}">${ghr}% · ${gp>=0?'+':''}$${gp.toFixed(0)}</span></div>`;
  }).join('');
  const recent=bets.slice(0,10).map(b=>`<div class="dr">
    <span class="dl">${ICONS[b.sport]||''} ${b.player.split(' ').pop()} ${b.recommendation} ${b.bookmaker_line}</span>
    <span style="color:#334155;font-size:10px">${b.actual_value??'–'} réel</span>
    <span style="color:${b.status==='won'?'#4ade80':'#f87171'}">${b.status==='won'?'✅':'❌'}</span></div>`).join('');
  document.getElementById('btContent').innerHTML=`
    <div style="font-weight:700;color:#a78bfa;margin-bottom:10px">🔬 Backtest — bets résolus</div>
    <div class="kpi-grid" style="margin-bottom:10px">
      <div class="kpi"><div class="kpi-v ${parseFloat(hr)>=52.4?'green':'red'}">${hr}%</div><div class="kpi-l">Hit Rate</div></div>
      <div class="kpi"><div class="kpi-v ${parseFloat(roi)>=0?'green':'red'}">${parseFloat(roi)>=0?'+':''}${roi}%</div><div class="kpi-l">ROI</div></div>
      <div class="kpi"><div class="kpi-v blue">${bets.length}</div><div class="kpi-l">Bets résolus</div></div>
    </div>
    <div class="detail-sec"><div class="detail-title">Par sport</div>${sportRows}</div>
    <div class="detail-sec"><div class="detail-title">Par grade</div>${gradeRows}</div>
    <div class="detail-sec"><div class="detail-title">10 derniers</div>${recent}</div>
    <div style="margin-top:8px;font-size:10px;color:#334155;text-align:center">Simulation $10/bet @ -110 · Breakeven = 52.4%</div>`;
}
